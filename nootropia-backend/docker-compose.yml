services:
  postgres:
    image: postgres:16
    container_name: nootropia-postgres
    environment:
      POSTGRES_USER: nootropia
      POSTGRES_PASSWORD: nootropia123
      POSTGRES_DB: nootropia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2
    container_name: nootropia-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: