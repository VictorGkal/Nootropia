services:
  postgres:
    image: postgres:16
    container_name: nootropia-postgres
    environment:
      POSTGRES_USER: nootropia
      POSTGRES_PASSWORD: nootropia123
      POSTGRES_DB: nootropia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2
    container_name: nootropia-redis
    ports:
      - "6379:6379"

  backend:
    build: ./nootropia-backend
    container_name: nootropia-backend
    ports:
      - "8000:8000"
    env_file:
      - ./nootropia-backend/.env
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./nootropia-frontend
    container_name: nootropia-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
